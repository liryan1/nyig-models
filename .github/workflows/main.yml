name: Build and push package to npm on merge to 'main'

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
